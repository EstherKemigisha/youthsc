<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <script>
      ;(function () {
        var t = localStorage.getItem('ysc-theme')
        if (t === 'light' || t === 'dark') {
          document.documentElement.setAttribute('data-theme', t)
          document.documentElement.style.colorScheme = t
        }
      })()
    </script>
    <title>YSC — Influencing the Culture for Jesus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Allura&family=Bebas+Neue&family=Montserrat:wght@500;700;800;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
